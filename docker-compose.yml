services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: flowstack3
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
    environment:
      PORT: 4000
      DATABASE_URL: postgresql://postgres:postgres@db:5432/flowstack3
      JWT_SECRET: dev-jwt-secret-DO-NOT-USE-IN-PRODUCTION
      ENCRYPTION_KEY: dev-encrypt-key-DO-NOT-USE-IN-PRODUCTION
      MICROSOFT_CLIENT_ID: ${MICROSOFT_CLIENT_ID:-}
      MICROSOFT_CLIENT_SECRET: ${MICROSOFT_CLIENT_SECRET:-}
      MICROSOFT_TENANT_ID: ${MICROSOFT_TENANT_ID:-common}
      MICROSOFT_REDIRECT_URI: http://localhost:4000/auth/callback
      FRONTEND_URL: http://localhost:3000
      REDIS_URL: redis://redis:6379
      QUEUE_INLINE_MODE: "true"
    depends_on:
      - db
      - redis
    ports:
      - "4000:4000"

  worker:
    build:
      context: ./backend
    command: npm run worker
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/flowstack3
      JWT_SECRET: dev-jwt-secret-DO-NOT-USE-IN-PRODUCTION
      ENCRYPTION_KEY: dev-encrypt-key-DO-NOT-USE-IN-PRODUCTION
      REDIS_URL: redis://redis:6379
      QUEUE_INLINE_MODE: "false"
    depends_on:
      - db
      - redis

  frontend:
    build:
      context: ./frontend
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:4000
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-dev-nextauth-secret-change-in-production-must-be-32-chars}
      LOG_LEVEL: info
    depends_on:
      - backend
    ports:
      - "3000:3000"

volumes:
  postgres-data:
